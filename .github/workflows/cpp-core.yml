name: C++ Core Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev cmake

    - name: Configure CMake
      run: cmake -S Core -B Core/build

    - name: Build
      run: cmake --build Core/build
